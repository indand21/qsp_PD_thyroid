[tool:pytest]
# pytest configuration file for QSP_PD_Thyroid testing framework

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for system interactions
    performance: Performance tests and benchmarks
    slow: Tests that take more than 1 second to run
    smoke: Basic smoke tests to verify system functionality
    regression: Regression tests for known issues
    scientific: Tests that validate scientific accuracy
    
# Minimum version required
minversion = 6.0

# Test session configuration
timeout = 300
timeout_method = thread

# Coverage configuration
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*
    setup.py
    */migrations/*
    */venv/*
    */env/*
    */virtualenv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod